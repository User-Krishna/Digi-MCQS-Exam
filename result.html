<!DOCTYPE html>
<html>

<head>
  <title>Exam Result</title>
  <link rel="stylesheet" href="css/result.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body onload="startResultTimer()">

  <!-- HEADER -->
  <header class="topbar">
    <div class="brand">
      <img src="images/schoolLogo.jpg">
      <div>
        <h1>BRIGHT FUTURE SCHOOL</h1>
        <p>Satdobato, Lalitpur, Nepal</p>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <div class="container">

    <!-- CENTER CARD -->
    <div class="card">

      <img src="images/result.png" class="big-icon">

      <h2>🎓 Examination Successfully Submitted</h2>

      <p class="subtitle">
        Your responses have been recorded. Please wait while the system evaluates your performance.
      </p>

      <!-- TIMER -->
      <div class="timer-box">
        <div class="timer-label">Result Processing Time</div>
        <div class="timer-number">
          <span id="count"></span> sec
        </div>
      </div>

      <!-- RESULT -->
      <div id="result"></div>

      <button id="pdfBtn" onclick="downloadPDF()" style="display:none;">
        📄 Download Result Report
      </button>

    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 Bright Future School | Examination Department | All Rights Reserved
  </footer>

  <script src="script/script.js"></script>

</body>

</html>
