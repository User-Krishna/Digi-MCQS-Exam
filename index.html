<!DOCTYPE html>
<html>

<head>
  <title>Student Login - Exam Portal</title>
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <h1>📘 BRIGHT FUTURE SCHOOL</h1>
    <div>First Terminal <span>MCQ Assessment</span></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="card">

      <!-- LEFT SIDE -->
      <div class="left">
        <img src="images/schoolLogo.jpg" alt="School Logo">
        <h2>BRIGHT FUTURE SCHOOL</h2>
        <p>Satdobato, Lalitpur</p>

        <div class="exam-tag">
          Multiple Choice Question Exam
        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right">
        <h2>Student Login</h2>

        <input id="username" placeholder="Enter Name">
        <input id="password" type="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

        <div class="footer">
          Secure Exam Portal © 2026
        </div>
      </div>

    </div>

  </div>
  <script src="script/script.js"></script>
</body>

</html>
